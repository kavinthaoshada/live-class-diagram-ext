name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Also publish each package to the VS Code Marketplace (requires the VSCE_PAT repo secret)"
        type: boolean
        default: false

jobs:
  build:
    name: Package (${{ matrix.vsce_target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            vsce_target: win32-x64
            exe_name: rust-engine.exe
          # macos-13 was fully retired by GitHub in December 2025; Intel Mac
          # builds now run on macos-15-intel instead.
          - runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            vsce_target: darwin-x64
            exe_name: rust-engine
          - runner: macos-14
            rust_target: aarch64-apple-darwin
            vsce_target: darwin-arm64
            exe_name: rust-engine
          - runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            vsce_target: linux-x64
            exe_name: rust-engine
          - runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            vsce_target: linux-arm64
            exe_name: rust-engine

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      # Cross-compiling aarch64 Linux from an x86_64 Ubuntu runner needs its
      # own linker/C compiler, since tree-sitter grammars compile C sources.
      - name: Install aarch64 Linux cross toolchain
        if: matrix.rust_target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build rust-engine
        working-directory: rust-engine
        run: cargo build --release --target ${{ matrix.rust_target }}

      - name: Copy engine binary into extension bin/
        shell: bash
        run: |
          mkdir -p live-class-diagram/bin
          cp "rust-engine/target/${{ matrix.rust_target }}/release/${{ matrix.exe_name }}" "live-class-diagram/bin/${{ matrix.exe_name }}"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install extension dependencies
        working-directory: live-class-diagram
        run: npm ci

      - name: Bundle webview
        working-directory: live-class-diagram
        run: npm run compile:webview

      - name: Package extension (${{ matrix.vsce_target }})
        working-directory: live-class-diagram
        run: npx @vscode/vsce package --target ${{ matrix.vsce_target }} --no-dependencies

      - uses: actions/upload-artifact@v4
        with:
          name: live-class-diagram-${{ matrix.vsce_target }}
          path: live-class-diagram/*.vsix

  publish-release:
    name: Attach VSIX files to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Runs for a real tag push, and also for a manual run from a branch
    # (e.g. re-running from `main` after a workflow fix) — a tag push alone
    # used to be required, which meant manual re-runs silently skipped this
    # job entirely.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    # The default GITHUB_TOKEN is read-only on newer repos; creating a
    # release needs write access, scoped to just this job.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist

      # A tag push already tells us the release tag from github.ref. A
      # manual run from a branch doesn't have one, so fall back to
      # "v<version from package.json>" — softprops/action-gh-release creates
      # the tag itself if it doesn't already exist.
      - name: Determine release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            version=$(node -p "require('./live-class-diagram/package.json').version")
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: dist/**/*.vsix

  publish-marketplace:
    name: Publish to VS Code Marketplace
    needs: build
    runs-on: ubuntu-latest
    # Never runs on a plain tag push — only when someone explicitly ticks
    # "publish" while manually running this workflow from the Actions tab,
    # so a release is never auto-published without a deliberate action.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish each platform package
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          # The Marketplace gallery API occasionally times out on a publish
          # request for reasons unrelated to the package itself (transient,
          # not something a retry-with-the-same-file risks corrupting —
          # vsce refuses to publish a version that's already live, so a
          # retry after a real partial success just fails loudly instead of
          # double-publishing).
          for file in dist/*/*.vsix; do
            echo "Publishing $file"
            attempt=1
            max_attempts=3
            until npx --yes @vscode/vsce publish --packagePath "$file"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Failed to publish $file after $max_attempts attempts"
                exit 1
              fi
              delay=$((attempt * 30))
              echo "Attempt $attempt failed, retrying in ${delay}s..."
              sleep "$delay"
              attempt=$((attempt + 1))
            done
          done
